name: Release MidiEditor AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          $version = $tag -replace '^v', ''
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Release version: $version (tag: $tag)"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.*'
          arch: win64_msvc2019_64
          host: 'windows'
          target: 'desktop'
          cache: true
          modules: 'qtmultimedia'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: CMake Configure
        run: |
          cmake -S . -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: CMake Build
        run: |
          cmake --build build --config Release

      - name: Deploy Qt
        run: |
          windeployqt build\bin\MidiEditorAI.exe --release --compiler-runtime --no-translations --no-system-d3d-compiler --no-opengl-sw

      - name: Package Release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releaseDir = "MidiEditorAI-v${version}-win64"

          # Create release directory
          New-Item -ItemType Directory -Path $releaseDir -Force

          # Copy build output
          Copy-Item -Recurse "build\bin\*" "$releaseDir\"

          # Copy runtime assets
          Copy-Item -Recurse "run_environment\metronome" "$releaseDir\metronome"
          Copy-Item -Recurse "run_environment\graphics" "$releaseDir\graphics"
          Copy-Item "run_environment\midieditor.ico" "$releaseDir\"
          if (Test-Path "run_environment\mozart_turkish_march.mid") {
            Copy-Item "run_environment\mozart_turkish_march.mid" "$releaseDir\"
          }

          # Create zip
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "MidiEditorAI-v${version}-win64.zip"
          echo "RELEASE_ZIP=MidiEditorAI-v${version}-win64.zip" >> $env:GITHUB_ENV

      - name: Generate Changelog
        id: changelog
        shell: pwsh
        run: |
          # Get commits since last tag
          $previousTag = git describe --tags --abbrev=0 HEAD~1 2>$null
          if ($LASTEXITCODE -ne 0) {
            $log = git log --oneline -20
          } else {
            $log = git log --oneline "$previousTag..HEAD"
          }
          $changelog = $log -join "`n"
          # Write to file for the release body
          Set-Content -Path "RELEASE_NOTES.md" -Value "## Changes`n`n$changelog"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: MidiEditor AI ${{ steps.version.outputs.TAG }}
          body_path: RELEASE_NOTES.md
          files: ${{ env.RELEASE_ZIP }}
          draft: false
          prerelease: false
