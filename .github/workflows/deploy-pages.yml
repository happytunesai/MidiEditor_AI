name: Deploy Manual to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'manual/**'
      - 'CHANGELOG.md'
      - 'scripts/build_changelog.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build changelog.html from CHANGELOG.md
        id: build_changelog
        run: |
          set -e
          OUTPUT=$(python scripts/build_changelog.py)
          echo "$OUTPUT"

          # Echo full output into the run summary so it's visible at a glance
          {
            echo "## :scroll: Changelog & Manual Regeneration"
            echo ""
            echo "Ran \`scripts/build_changelog.py\` against \`CHANGELOG.md\`:"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            # Highlight which manual files actually changed in this run
            CHANGED=$(git status --porcelain manual/ | sed 's/^/  /' || true)
            if [ -n "$CHANGED" ]; then
              echo "**Regenerated / patched files:**"
              echo ""
              echo '```'
              echo "$CHANGED"
              echo '```'
            else
              echo "_All manual artifacts were already up to date._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'manual'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: "Deployment Summary"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON=":white_check_mark:"
            MSG="Deployed"
          else
            ICON=":x:"
            MSG="Failed"
          fi
          {
            echo "## :globe_with_meridians: Manual Deployment"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${ICON} ${MSG} |"
            echo "| **URL** | https://midieditor-ai.de |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Changelog** | regenerated from \`CHANGELOG.md\` via \`scripts/build_changelog.py\` |"
          } >> $GITHUB_STEP_SUMMARY
