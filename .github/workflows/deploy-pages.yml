name: Deploy Manual to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'manual/**'
      - 'CHANGELOG.md'
      - 'scripts/build_changelog.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build changelog.html from CHANGELOG.md
        run: python scripts/build_changelog.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'manual'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: "Deployment Summary"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON=":white_check_mark:"
            MSG="Deployed"
          else
            ICON=":x:"
            MSG="Failed"
          fi
          {
            echo "## :globe_with_meridians: Manual Deployment"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${ICON} ${MSG} |"
            echo "| **URL** | https://midieditor-ai.de |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> $GITHUB_STEP_SUMMARY
