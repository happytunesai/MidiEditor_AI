name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'manual/**'
      - 'Planning/**'
      - 'examples/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Create a release with this tag (e.g. v1.3.3). Leave empty for build only.'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────
  #  Build — always runs
  # ─────────────────────────────────────────────────────
  build:
    name: "\U0001F528 Build"
    # Pinned to windows-2022: 'windows-latest' was redirected to
    # windows-2025-vs2026 (MSVC 14.51) on 2026-06-15, whose STL dropped the
    # 'stdext' namespace that Qt 6.5.3's qvarlengtharray.h still relies on
    # (error C2065/C3861 'stdext'). windows-2022 (VS 2022, MSVC 14.4x) is ABI-
    # compatible with the win64_msvc2019_64 Qt build and is the image that
    # successfully built every release through 1.8.1.1.
    runs-on: windows-2022
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}

    steps:
      - name: "\U0001F50D Detect build type"
        id: detect
        shell: pwsh
        run: |
          $isRelease = "false"
          $tag = ""
          $version = ""

          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $isRelease = "true"
            $tag = "${{ github.ref_name }}"
          }
          elseif ("${{ inputs.release_tag }}" -ne "") {
            $isRelease = "true"
            $tag = "${{ inputs.release_tag }}"
          }

          if ($tag) { $version = $tag -replace '^v','' }

          "is_release=$isRelease" >> $env:GITHUB_OUTPUT
          "tag=$tag"              >> $env:GITHUB_OUTPUT
          "version=$version"      >> $env:GITHUB_OUTPUT
          "BUILD_START=$(Get-Date -UFormat %s)" >> $env:GITHUB_ENV

          # Summary header
          $icon  = if ($isRelease -eq "true") { "`u{1F680}" } else { "`u{1F528}" }
          $title = if ($isRelease -eq "true") { "Release Build - $tag" } else { "CI Build" }
          @"
          ## $icon $title

          "@ >> $env:GITHUB_STEP_SUMMARY

      # ── Dependencies ──────────────────────────────────

      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ steps.detect.outputs.is_release == 'true' && 0 || 1 }}
          submodules: recursive

      - name: "\U0001F4E6 Install Qt 6.5"
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.*'
          arch: win64_msvc2019_64
          host: windows
          target: desktop
          # QtMultimedia is an add-on module (not in base Qt) - required since
          # 1.8.0 for QAudioSink (authentic SID playback). Without it CMake's
          # find_package(... Multimedia) fails at configure on CI.
          modules: qtmultimedia
          cache: true

      - name: "\U0001F527 Setup MSVC x64"
        shell: pwsh
        run: |
          # Import the MSVC x64 build environment (INCLUDE/LIB/LIBPATH/PATH/...)
          # into the job so the NMake-generator configure/build below find cl.exe
          # and the toolchain. Replaces ilammy/msvc-dev-cmd (a Node 20 action that
          # GitHub now force-runs on Node 24) with a plain shell step - no
          # third-party action, no Node 20 deprecation warning.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { Write-Error "Visual Studio with the VC x64 toolset was not found"; exit 1 }
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) { Write-Error "vcvars64.bat not found at $vcvars"; exit 1 }
          # vcvars64 runs in cmd; capture the resulting environment and forward the
          # changed variables to $GITHUB_ENV. The leading >nul drops the banner;
          # `set` after && is NOT redirected, so its output reaches the pipeline.
          # Lines starting with "=" (cmd drive pseudo-vars) are skipped by the regex.
          cmd /c "`"$vcvars`" >nul 2>&1 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }
          "- [x] **MSVC** - x64 environment imported via vcvars64 (vswhere, no Node action)" >> $env:GITHUB_STEP_SUMMARY

      - name: "\U0001F3B5 Download FluidSynth"
        shell: pwsh
        run: |
          $v = "v2.5.2"
          $url = "https://github.com/FluidSynth/fluidsynth/releases/download/$v/fluidsynth-$v-win10-x64-cpp11.zip"
          Invoke-WebRequest $url -OutFile fs.zip
          Expand-Archive fs.zip -DestinationPath fluidsynth
          Remove-Item fs.zip
          "- [x] **Dependencies** - Qt 6.5, MSVC 2019 x64, FluidSynth $v" >> $env:GITHUB_STEP_SUMMARY

      - name: "\U0001F4C2 Unpack libsidplayfp"
        shell: pwsh
        run: |
          # Vendored libsidplayfp ships as a single committed archive
          # (third_party/libsidplayfp-vendored.zip) instead of ~140 loose files;
          # unpack it so the 'sidplayfp' subdirectory exists before configure.
          # CMakeLists.txt also auto-extracts it as a fallback, so this explicit
          # step is mainly for visibility in the Actions log.
          & cmake -E chdir third_party cmake -E tar xf libsidplayfp-vendored.zip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          "- [x] **Unpack** - vendored libsidplayfp extracted from zip" >> $env:GITHUB_STEP_SUMMARY

      # ── Configure ──────────────────────────────────────

      - name: "\u2699\uFE0F CMake Configure"
        shell: pwsh
        run: |
          $fsDir = "$env:GITHUB_WORKSPACE\fluidsynth\fluidsynth-v2.5.2-win10-x64-cpp11"
          & cmake -S . -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release "-DFLUIDSYNTH_DIR=$fsDir"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          "- [x] **Configure** - CMake Release, NMake Makefiles" >> $env:GITHUB_STEP_SUMMARY

      # ── Build ──────────────────────────────────────────

      - name: "\U0001F528 CMake Build"
        shell: pwsh
        run: |
          & cmake --build build --config Release
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          "- [x] **Build** - Release" >> $env:GITHUB_STEP_SUMMARY

      # ── Package ────────────────────────────────────────

      - name: "\U0001F4CB Deploy Qt + \U0001F4E6 Package"
        shell: pwsh
        run: |
          & windeployqt build\bin\MidiEditorAI.exe --release --compiler-runtime --no-translations --no-system-d3d-compiler --no-opengl-sw
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

          # Strip the Qt FFmpeg media backend (~15 MB). MidiEditor only uses
          # QAudioSink for audio out (served by the native windowsmediaplugin)
          # plus FluidSynth/libsndfile + LAME for export - it never uses
          # QMediaPlayer/QMediaRecorder, so the ffmpeg media plugin is dead
          # weight. Verified: SID playback (SF2 + Emulation) and WAV/OGG/FLAC/MP3
          # export all work without it. The small windowsmediaplugin stays.
          Remove-Item build\bin\multimedia\ffmpegmediaplugin.dll -ErrorAction SilentlyContinue
          "- [x] **Trim** - removed unused Qt FFmpeg media backend (~15 MB)" >> $env:GITHUB_STEP_SUMMARY

          # Runtime assets
          Copy-Item -Recurse run_environment\graphics build\bin\graphics
          if (Test-Path run_environment\metronome) {
            Copy-Item -Recurse run_environment\metronome build\bin\metronome
          }
          Copy-Item run_environment\midieditor.ico build\bin\
          if (Test-Path run_environment\mozart_turkish_march.mid) {
            Copy-Item run_environment\mozart_turkish_march.mid build\bin\
          }
          if (Test-Path run_environment\updater.bat) {
            Copy-Item run_environment\updater.bat build\bin\
          }
          # Top-level docs + license. LICENSE is mandatory for GPL-3 distribution;
          # README + CHANGELOG ride along so users have the release notes offline.
          # FluidSynth DLLs (libfluidsynth-3.dll / SDL3.dll / sndfile.dll) are
          # already in build\bin\ via CMake's POST_BUILD copy hook, so no extra
          # copy needed for those.
          # Test-Path guards mirror release.bat's `if exist` behaviour — without
          # them a missing top-level file would hard-fail the step on pwsh
          # ($ErrorActionPreference='stop' is the GitHub Actions default).
          if (Test-Path LICENSE)      { Copy-Item LICENSE      build\bin\ }
          if (Test-Path README.md)    { Copy-Item README.md    build\bin\ }
          if (Test-Path CHANGELOG.md) { Copy-Item CHANGELOG.md build\bin\ }
          "- [x] **Package** - Qt deployed, runtime assets + docs bundled" >> $env:GITHUB_STEP_SUMMARY

      - name: "\u2B06\uFE0F Upload artifact"
        uses: actions/upload-artifact@v7
        with:
          name: MidiEditorAI-win64
          path: build/bin/
          retention-days: ${{ steps.detect.outputs.is_release == 'true' && 90 || 14 }}

      # ── Summary ────────────────────────────────────────

      - name: "\U0001F4CA Build Summary"
        if: always()
        shell: pwsh
        run: |
          $mins = [math]::Round(((Get-Date -UFormat %s) - $env:BUILD_START) / 60, 1)
          $ok = "${{ job.status }}" -eq "success"
          $icon = if ($ok) { "`u{2705}" } else { "`u{274C}" }
          $sha = "${{ github.sha }}".Substring(0, 7)
          @"

          ---

          | | |
          |---|---|
          | **Result** | $icon ${{ job.status }} |
          | **Duration** | ${mins} min |
          | **Commit** | ``$sha`` |
          | **Toolchain** | Qt 6.5 - MSVC 2019 x64 - FluidSynth 2.5.2 |
          "@ >> $env:GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────
  #  Build macOS — build-only, no tests/artifacts
  # ─────────────────────────────────────────────────────
  build-macos:
    name: "\U0001F528 Build macOS"
    runs-on: macos-15
    
    steps:
      - name: "\U0001F50D Checkout"
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: "\U0001F4E5 Install dependencies"
        run: brew bundle
        
      - name: "\u2699\uFE0F CMake Configure"
        run: cmake -S . -B build-mac
        
      - name: "\U0001F528 CMake Build"
        run: |
          cmake --build build-mac -j8
          cmake --build build-mac -j1

  # ─────────────────────────────────────────────────────
  #  Release — only on v* tag push or manual dispatch
  # ─────────────────────────────────────────────────────
  release:
    name: "\U0001F680 Release"
    needs: build
    if: needs.build.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "\U0001F4E5 Download build artifact"
        uses: actions/download-artifact@v8
        with:
          name: MidiEditorAI-win64
          path: pkg/

      - name: "\U0001F4E6 Create release archive"
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          DIR="MidiEditorAI-${TAG}-win64"
          mv pkg "$DIR"
          zip -r "${DIR}.zip" "$DIR"
          echo "RELEASE_ZIP=${DIR}.zip" >> $GITHUB_ENV

      - name: "\U0001F4DD Extract release notes"
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${TAG#v}"

          # Extract release title from CHANGELOG header
          # Format: ## [1.3.2.1] - 2026-04-16 — Hotfix: Ctrl+Drag Deselection & CI Workflow
          TITLE=$(grep -m1 "^## \[${VERSION}\]" CHANGELOG.md | sed 's/^## \['"${VERSION}"'\] - [0-9-]* — //' | sed 's/^## \['"${VERSION}"'\] - [0-9-]* - //')
          if [ -n "$TITLE" ]; then
            echo "RELEASE_TITLE=${TAG} - ${TITLE}" >> $GITHUB_ENV
          else
            echo "RELEASE_TITLE=MidiEditor AI ${TAG}" >> $GITHUB_ENV
          fi

          # Extract latest version section from CHANGELOG.md
          awk '/^## \[/{n++} n==1' CHANGELOG.md | sed '/^---$/d' > RELEASE_NOTES.md

          # Fallback to git log if CHANGELOG section is empty
          if [ ! -s RELEASE_NOTES.md ]; then
            PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
            {
              echo "## Changes"
              echo ""
              if [ -n "$PREV" ]; then
                git log --oneline "${PREV}..${TAG}"
              else
                git log --oneline -20
              fi
            } > RELEASE_NOTES.md
          fi

      - name: "\U0001F680 Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: RELEASE_NOTES.md
          files: ${{ env.RELEASE_ZIP }}
          draft: false
          prerelease: false

      - name: "\U0001F4CA Release Summary"
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          SIZE=$(du -h "${{ env.RELEASE_ZIP }}" | cut -f1)
          {
            echo "## :rocket: Release Published"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Tag** | \`${TAG}\` |"
            echo "| **Archive** | \`${{ env.RELEASE_ZIP }}\` (${SIZE}) |"
            echo "| **Status** | :white_check_mark: Published on GitHub |"
          } >> $GITHUB_STEP_SUMMARY
